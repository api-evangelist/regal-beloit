description: >-
  Regal Beloit was a global manufacturer of electric motors, electrical motion
  controls, power generation, and power transmission products before merging
  with Rexnord's Process & Motion Control segment in October 2021 to form
  Regal Rexnord Corporation. Major brands included Marathon, Leeson, Genteq
  (HVAC brushless DC motors), and Browning (power transmission). Regal Rexnord
  continues these product lines and is developing the Perceptiv IIoT platform
  for motor condition monitoring and predictive maintenance.
